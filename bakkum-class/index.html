<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쏘이지 · 수업 관리</title>
  <!-- 앱 아이콘(파비콘·홈화면·즐겨찾기) + PWA -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#F4A93C" />
  <meta name="apple-mobile-web-app-title" content="쏘이지" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <!-- 로고 워드마크 전용 Jua (그 외 모든 텍스트는 Pretendard) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&display=swap" />
  <style>
    /* 번들 CSS 로드 전 깜빡임 방지 — 앱 배경색과 맞춤(쏘이지 크림 / 다크). */
    html{background:#FDF6E8}
    html[data-theme="dark"]{background:#10151f}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // 첫 페인트 전에 테마 적용 — 깜빡임(흰 화면 번쩍) 방지.
    // 저장된 선택이 없으면 시스템 설정(prefers-color-scheme)을 따른다.
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var dark = saved ? saved === "dark"
          : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
