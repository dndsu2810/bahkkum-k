<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바꿈 통합 허브 — 와이어프레임</title>
<link rel="stylesheet" href="wireframe.css">
<link rel="stylesheet" href="wf-chrome.css">
<style>
  html, body { margin: 0; height: 100%; background: #0b0d10; overflow: hidden; }
  #root { height: 100%; }
  .wf-stack { flex: 1; min-width: 0; display: flex; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="wf-components.jsx"></script>
<script type="text/babel" src="wf-shell.jsx"></script>
<script type="text/babel" src="screens-core.jsx"></script>
<script type="text/babel" src="screens-english.jsx"></script>
<script type="text/babel" src="screens-shared.jsx"></script>
<script type="text/babel" src="screens-ops.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const R = React.createElement;

const SCREEN_CTX = { director: "admin", english: "english", "english-dash": "english", desk: "desk", report: "admin", math: "admin" };

function load() { try { return JSON.parse(localStorage.getItem("bakkum_wf")) || {}; } catch (e) { return {}; } }

// ---------- 컨트롤 레일 ----------
function ControlRail({ screen, device, theme, anno, go, setDevice, setTheme, setAnno }) {
  return R("div", { className: "rail" },
    R("div", { className: "rail-head" },
      R("div", { className: "rail-title" },
        R("div", { className: "mk" }, "바"),
        R("div", { className: "col" },
          R("b", null, "바꿈 통합 허브"),
          R("span", null, "와이어프레임 · 역할 기반")))),
    R("div", { className: "rail-controls" },
      R("div", { className: "seg" },
        R("button", { className: device === "desktop" ? "on" : "", onClick: () => setDevice("desktop") }, R(Icon, { name: "desktop", size: 15 }), "데스크탑"),
        R("button", { className: device === "mobile" ? "on" : "", onClick: () => setDevice("mobile") }, R(Icon, { name: "phone", size: 15 }), "모바일")),
      R("div", { className: "seg" },
        R("button", { className: theme === "light" ? "on" : "", onClick: () => setTheme("light") }, R(Icon, { name: "sun", size: 15 }), "라이트"),
        R("button", { className: theme === "dark" ? "on" : "", onClick: () => setTheme("dark") }, R(Icon, { name: "moon", size: 15 }), "다크")),
      R("div", { className: "ctl-row", style: { padding: "2px 2px 6px" } },
        R("span", { className: "row gap", style: { gap: 7 } }, R(Icon, { name: "note", size: 15 }), "핸드오프 주석"),
        R(Toggle, { on: anno, onClick: () => setAnno(a => !a) }))),
    R("div", { className: "rail-nav" },
      NAV.map((grp, gi) =>
        R("div", { key: gi },
          R("div", { className: "rail-group" }, grp.group),
          grp.items.map(it =>
            R("div", { key: it.id, className: "rail-item" + (it.id === screen ? " on" : ""), onClick: () => go(it.id) },
              R(Icon, { name: it.icon, size: 16, className: "ic" }),
              R("span", { className: "grow" }, it.label)))))),
    R("div", { className: "rail-foot" },
      "중충실도 와이어프레임 · 클릭 가능한 흐름", R("br"),
      "로그인 → 역할 분기 → 화면 이동"));
}

// ---------- 앱 루트 ----------
function App() {
  const p = load();
  const [screen, setScreen] = useState(p.screen || "login");
  const [ctx, setCtx] = useState(p.ctx || "admin");
  const [device, setDevice] = useState(p.device || "desktop");
  const [theme, setTheme] = useState(p.theme || "light");
  const [anno, setAnno] = useState(p.anno !== undefined ? p.anno : true);

  useEffect(() => {
    localStorage.setItem("bakkum_wf", JSON.stringify({ screen, ctx, device, theme, anno }));
  }, [screen, ctx, device, theme, anno]);

  const go = (id, c) => {
    setScreen(id);
    setCtx(c || SCREEN_CTX[id] || ctx);
    const st = document.querySelector(".stage");
    if (st) st.scrollTop = 0;
  };

  const Comp = window.SCREENS[screen] || window.SCREENS.login;
  const notes = (Comp && Comp.notes) || [];
  const showAnno = anno && notes.length > 0;

  return R("div", { className: "app-root" },
    R(ControlRail, { screen, device, theme, anno, go, setDevice, setTheme, setAnno }),
    R("div", { className: "wf wf-stack", "data-theme": theme, "data-no-anno": anno ? undefined : "1" },
      R("div", { className: "stage" + (device === "mobile" ? " mob" : "") },
        R(DeviceFrame, { device, key: device },
          R("div", { className: "screen-wrap" }, R(Comp, { device, go, ctx }), R(ToastHost)))),
      showAnno ? R(AnnoPanel, { notes, screenLabel: LABEL[screen] || screen }) : null));
}

ReactDOM.createRoot(document.getElementById("root")).render(R(App));
</script>
</body>
</html>
