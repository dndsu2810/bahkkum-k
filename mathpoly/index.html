<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATHPOLY - 수학 땅따먹기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #F8FAFC; }
        .font-display { font-family: 'Jua', sans-serif; }
        .board-grid { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr); gap: 4px; }
        .board-tile { position: relative; border-radius: 12px; border: 2px solid #E2E8F0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4px; overflow: hidden; background: white; transition: all 0.2s; }
        .board-tile:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .corner-tile { background-color: #F1F5F9; }
        .player-token { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.07)); }
        .dice-roll { animation: diceShake 0.1s infinite; }
        @keyframes diceShake { 0% { transform: rotate(0deg); } 25% { transform: rotate(5deg); } 50% { transform: rotate(0deg); } 75% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); } }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display: ['Jua', 'sans-serif'], },
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Data ---
        const CHARACTERS = [
            { id: 1, name: '지우', color: 'bg-red-500', emoji: '🧑' },
            { id: 2, name: '민수', color: 'bg-blue-500', emoji: '👦' },
            { id: 3, name: '수아', color: 'bg-green-500', emoji: '👧' },
            { id: 4, name: '동현', color: 'bg-yellow-500', emoji: '🤓' },
            { id: 5, name: '유나', color: 'bg-purple-500', emoji: '👩' },
            { id: 6, name: '승민', color: 'bg-orange-500', emoji: '😎' },
            { id: 7, name: '하은', color: 'bg-pink-500', emoji: '👱‍♀️' },
        ];

        const BOARD_SPACES = [
            { id: 0, type: 'start', name: '출발' },
            { id: 1, type: 'land', name: '덧셈 마을', price: 100, rent: 20, colorGroup: 'bg-pink-400' },
            { id: 2, type: 'land', name: '뺄셈 마을', price: 100, rent: 20, colorGroup: 'bg-pink-400' },
            { id: 3, type: 'land', name: '구구단 시티', price: 150, rent: 30, colorGroup: 'bg-orange-400' },
            { id: 4, type: 'land', name: '나눗셈 시티', price: 150, rent: 30, colorGroup: 'bg-orange-400' },
            { id: 5, type: 'jail', name: '수학 감옥' },
            { id: 6, type: 'land', name: '분수 아일랜드', price: 200, rent: 40, colorGroup: 'bg-yellow-400' },
            { id: 7, type: 'land', name: '소수 아일랜드', price: 200, rent: 40, colorGroup: 'bg-yellow-400' },
            { id: 8, type: 'land', name: '도형 왕국', price: 250, rent: 50, colorGroup: 'bg-green-400' },
            { id: 9, type: 'land', name: '각도 왕국', price: 250, rent: 50, colorGroup: 'bg-green-400' },
            { id: 10, type: 'chance', name: '찬스 카드' },
            { id: 11, type: 'land', name: '비례식 행성', price: 300, rent: 60, colorGroup: 'bg-blue-400' },
            { id: 12, type: 'land', name: '방정식 행성', price: 300, rent: 60, colorGroup: 'bg-blue-400' },
            { id: 13, type: 'land', name: '확률 우주', price: 350, rent: 70, colorGroup: 'bg-indigo-400' },
            { id: 14, type: 'land', name: '통계 우주', price: 350, rent: 70, colorGroup: 'bg-indigo-400' },
            { id: 15, type: 'challenge', name: '도전장' },
            { id: 16, type: 'land', name: '규칙성 은하', price: 400, rent: 80, colorGroup: 'bg-purple-400' },
            { id: 17, type: 'land', name: '함수 은하', price: 400, rent: 80, colorGroup: 'bg-purple-400' },
            { id: 18, type: 'land', name: '논리 블랙홀', price: 500, rent: 100, colorGroup: 'bg-slate-400' },
            { id: 19, type: 'land', name: '창의력 화이트홀', price: 500, rent: 100, colorGroup: 'bg-slate-400' },
        ];

        const getGridPosition = (index) => {
            if (index >= 0 && index <= 5) return { col: 6 - index, row: 6 };
            if (index >= 6 && index <= 10) return { col: 1, row: 6 - (index - 5) };
            if (index >= 11 && index <= 15) return { col: 1 + (index - 10), row: 1 };
            if (index >= 16 && index <= 19) return { col: 6, row: 1 + (index - 15) };
            return { col: 1, row: 1 };
        };

        const generateProblem = (grade, diff) => {
            const a = Math.floor(Math.random() * (diff === 'high' ? 100 : 20)) + 5;
            const b = Math.floor(Math.random() * (diff === 'high' ? 100 : 20)) + 5;
            return { q: `${a} + ${b} = ?`, ans: (a+b).toString() };
        };

        // --- App Component ---
        function App() {
            const [gameState, setGameState] = useState('setup'); // setup, playing
            const [players, setPlayers] = useState([]);
            const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
            const [diceValue, setDiceValue] = useState(1);
            const [isRolling, setIsRolling] = useState(false);
            const [board, setBoard] = useState(BOARD_SPACES.map(s => ({ ...s, ownerId: null, level: 0 })));
            const [logs, setLogs] = useState([{ id: 0, text: '게임에 오신 것을 환영합니다!', type: 'info' }]);
            const [showModal, setShowModal] = useState(false);
            const [currentProblem, setCurrentProblem] = useState(null);
            const [userAnswer, setUserAnswer] = useState('');
            const [difficulty, setDifficulty] = useState(null);
            const [feedback, setFeedback] = useState(null);

            const currentPlayer = players[currentPlayerIndex];

            const addLog = (text, type = 'info') => {
                setLogs(prev => [{ id: Date.now(), text, type }, ...prev].slice(0, 5));
            };

            const rollDice = async () => {
                if (isRolling || showModal) return;
                setIsRolling(true);
                setFeedback(null);
                setDifficulty(null);
                setUserAnswer('');

                let lastV = 1;
                for(let i=0; i<12; i++) {
                    lastV = Math.floor(Math.random()*6)+1;
                    setDiceValue(lastV);
                    await new Promise(r => setTimeout(r, 60));
                }
                setIsRolling(false);
                movePlayer(lastV);
            };

            const movePlayer = (v) => {
                const p = { ...players[currentPlayerIndex] };
                const oldPos = p.position;
                p.position = (p.position + v) % 20;
                
                if (p.position < oldPos) {
                    p.money += 300;
                    addLog(`${p.name}님이 출발지를 지나 300원을 받았습니다!`, 'success');
                }

                const newPlayers = [...players];
                newPlayers[currentPlayerIndex] = p;
                setPlayers(newPlayers);

                const space = board[p.position];
                if (space.type === 'land') {
                    if (space.ownerId && space.ownerId !== p.id) {
                        const rent = (space.rent || 20) * (space.level + 1);
                        p.money -= rent;
                        const ownerIdx = newPlayers.findIndex(pl => pl.id === space.ownerId);
                        newPlayers[ownerIdx].money += rent;
                        addLog(`${space.name}에 도착! 통행료 ${rent}원을 지불했습니다.`, 'danger');
                        if (p.money < 0) {
                            p.isBankrupt = true;
                            addLog(`${p.name}님이 파산했습니다!`, 'danger');
                        }
                        setPlayers([...newPlayers]);
                        nextTurn();
                    } else {
                        setShowModal(true);
                    }
                } else {
                    nextTurn();
                }
            };

            const nextTurn = () => {
                let next = (currentPlayerIndex + 1) % players.length;
                while (players[next].isBankrupt && players.filter(pl => !pl.isBankrupt).length > 1) {
                    next = (next + 1) % players.length;
                }
                setCurrentPlayerIndex(next);
            };

            const handleAnswer = () => {
                if (userAnswer === currentProblem.ans) {
                    setFeedback({ ok: true, msg: '정답입니다! 땅을 차지했습니다!' });
                    const newBoard = [...board];
                    const s = newBoard[players[currentPlayerIndex].position];
                    if (!s.ownerId) {
                        s.ownerId = players[currentPlayerIndex].id;
                        s.level = 1;
                    } else {
                        s.level += 1;
                    }
                    setBoard(newBoard);
                    addLog(`${players[currentPlayerIndex].name}님이 ${s.name}의 주인이 되었습니다!`, 'success');
                } else {
                    setFeedback({ ok: false, msg: `아쉬워요! 정답은 ${currentProblem.ans}였습니다.` });
                }
            };

            if (gameState === 'setup') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-2xl w-full text-center border-4 border-blue-100">
                            <h1 className="font-display text-6xl text-blue-600 mb-8">MATHPOLY</h1>
                            <p className="text-xl text-slate-500 mb-10">참가 인원을 선택하고 이름을 적어주세요!</p>
                            <div className="flex gap-4 justify-center mb-10">
                                {[2,3,4].map(n => (
                                    <button key={n} onClick={() => {
                                        const p = Array.from({length: n}).map((_, i) => ({
                                            id: i+1, name: `플레이어 ${i+1}`, grade: 3, money: 1500, position: 0, characterId: i+1, color: CHARACTERS[i].color
                                        }));
                                        setPlayers(p);
                                        setGameState('playing');
                                    }} className="w-16 h-16 bg-blue-500 text-white rounded-2xl font-display text-2xl hover:scale-110 mb-2 transition">{n}명</button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            const activePlayers = players.filter(p => !p.isBankrupt);
            const winner = activePlayers.length === 1 ? activePlayers[0] : null;

            return (
                <div className="min-h-screen p-4 md:p-10 flex flex-col md:flex-row gap-10 items-center justify-center">
                    {/* Board */}
                    <div className="relative w-full max-w-xl aspect-square bg-blue-100 rounded-[2.5rem] shadow-2xl border-8 border-white p-3">
                        <div className="w-full h-full board-grid">
                            {board.map((s, i) => {
                                const pos = getGridPosition(i);
                                return (
                                    <div key={i} className={`board-tile ${i%5===0 ? 'corner-tile' : ''}`} style={{ gridColumn: pos.col, gridRow: pos.row }}>
                                        {s.colorGroup && <div className={`absolute top-0 left-0 right-0 h-1/4 ${s.colorGroup} opacity-50`} />}
                                        <span className="font-display text-[11px] md:text-sm pt-2">{s.name}</span>
                                        <div className="flex gap-0.5 mt-1">
                                            {s.level >= 1 && <i className="bi bi-house-fill text-amber-600"></i>}
                                            {s.level >= 2 && <i className="bi bi-building-fill text-blue-600"></i>}
                                            {s.level >= 3 && <i className="bi bi-award-fill text-red-500 animate-bounce"></i>}
                                        </div>
                                        {s.ownerId && <div className={`absolute bottom-0 left-0 right-0 h-1.5 ${players.find(p=>p.id===s.ownerId)?.color}`} />}
                                    </div>
                                )
                            })}
                            <div className="col-start-2 col-end-6 row-start-2 row-end-6 flex flex-col items-center justify-center">
                                <h2 className="font-display text-5xl text-blue-600 mb-6 drop-shadow-sm">MATHPOLY</h2>
                                <div className="bg-white/90 p-6 rounded-[2rem] shadow-xl text-center border-2 border-blue-50">
                                    <i className={`bi bi-dice-${diceValue}-fill text-7xl text-blue-500 ${isRolling ? 'dice-roll inline-block' : ''}`}></i>
                                    <button onClick={rollDice} disabled={isRolling || showModal} className="block mt-6 px-10 py-3 bg-yellow-400 hover:bg-yellow-300 font-display text-2xl rounded-full shadow-lg disabled:opacity-50 active:scale-95 transition">주사위 굴리기</button>
                                </div>
                            </div>
                        </div>
                        {/* Tokens */}
                        {players.map(p => {
                            if (p.isBankrupt) return null;
                            const pos = getGridPosition(p.position);
                            const offset = (p.id-1) * 12;
                            return (
                                <div key={p.id} className={`absolute w-10 h-10 rounded-full border-4 border-white shadow-xl flex items-center justify-center text-2xl player-token ${p.color}`}
                                    style={{ left: `${((pos.col-1)/6)*100 + 8}%`, top: `${((pos.row-1)/6)*100 + 8}%`, marginLeft: `${offset}px` }}>
                                    {CHARACTERS.find(c=>c.id===p.characterId)?.emoji}
                                </div>
                            )
                        })}
                    </div>

                    {/* Side */}
                    <div className="w-full max-w-sm space-y-6">
                        <div className="bg-white rounded-[2rem] p-8 shadow-xl border-4 border-slate-50">
                            <h3 className="font-display text-3xl mb-6 flex items-center gap-3"><i className="bi bi-people-fill text-blue-500"></i> 참가자</h3>
                            <div className="space-y-4">
                                {players.map(p => (
                                    <div key={p.id} className={`p-4 rounded-2xl border-2 flex justify-between items-center transition-all ${p.id === currentPlayer?.id ? 'border-blue-500 bg-blue-50 scale-105 shadow-md' : 'border-slate-100'} ${p.isBankrupt ? 'opacity-30' : ''}`}>
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">{CHARACTERS.find(c=>c.id===p.characterId)?.emoji}</span>
                                            <span className="font-bold text-lg">{p.name}</span>
                                        </div>
                                        <span className="font-display text-xl text-amber-600">₩{p.money}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-slate-800 text-white rounded-[2rem] p-8 shadow-xl h-48 overflow-y-auto">
                            <h3 className="font-display text-xl text-yellow-400 mb-4 flex items-center gap-2"><i className="bi bi-chat-left-text-fill"></i> 게임 기록</h3>
                            <div className="space-y-2 text-sm">
                                {logs.map(l => <div key={l.id} className="border-l-2 border-yellow-400/30 pl-3 py-1">{l.text}</div>)}
                            </div>
                        </div>
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                            <div className="bg-white rounded-[3rem] p-10 max-w-md w-full shadow-2xl border-t-8 border-blue-500 text-center">
                                <h2 className="font-display text-4xl mb-6">{board[currentPlayer.position].name} 미션!</h2>
                                {!difficulty ? (
                                    <div className="grid gap-4">
                                        <button onClick={()=>{setDifficulty('low'); setCurrentProblem(generateProblem(currentPlayer.grade, 'low'))}} className="py-4 bg-green-100 rounded-2xl font-bold border-2 border-green-200">쉬운 문제 (정가)</button>
                                        <button onClick={()=>{setDifficulty('high'); setCurrentProblem(generateProblem(currentPlayer.grade, 'high'))}} className="py-4 bg-red-100 rounded-2xl font-bold border-2 border-red-200">어려운 문제 (공짜!!)</button>
                                        <button onClick={()=>{setShowModal(false); nextTurn();}} className="text-slate-400 mt-4 underline">그냥 지나가기</button>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="text-3xl font-display py-6 bg-slate-50 rounded-2xl">{currentProblem.q}</div>
                                        {!feedback ? (
                                            <div className="flex gap-2">
                                                <input type="number" value={userAnswer} onChange={e=>setUserAnswer(e.target.value)} className="flex-1 border-2 border-blue-200 rounded-xl px-4 py-3 text-center text-2xl" placeholder="상자 속 정답은?" onKeyDown={e=>e.key==='Enter' && handleAnswer()} />
                                                <button onClick={handleAnswer} className="px-6 bg-blue-600 text-white rounded-xl font-bold">확인</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div className={`text-2xl font-bold ${feedback.ok ? 'text-green-600' : 'text-red-600'}`}>{feedback.msg}</div>
                                                <button onClick={()=>{setShowModal(false); nextTurn();}} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold">턴 종료</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Win Modal */}
                    {winner && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-blue-600 p-10 text-center text-white">
                            <div>
                                <i className="bi bi-trophy-fill text-[10rem] text-yellow-300 animate-bounce mb-10 inline-block"></i>
                                <h2 className="font-display text-7xl mb-6">최종 우승!</h2>
                                <p className="text-4xl mb-12">{winner.name}님이 매스폴리 왕이 되었습니다!</p>
                                <button onClick={()=>window.location.reload()} className="px-16 py-6 bg-white text-blue-600 rounded-full font-display text-3xl shadow-2xl">다시 하기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
